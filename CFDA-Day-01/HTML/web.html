<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="img/OIP.webp">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-18px); }
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        .float { animation: float 3s ease-in-out infinite; }
        .pulse-slow { animation: pulse-slow 2.2s ease-in-out infinite; }
        .grim-font { font-family: 'Creepster', cursive; }
        .death-font { font-family: 'Nosifer', cursive; }
    </style>
</head>

<body class="bg-black min-h-screen flex flex-col items-center justify-center px-4 overflow-x-hidden relative">

    <!-- Subtle Background -->
    <div class="absolute inset-0 opacity-5 bg-[radial-gradient(circle_at_center,white,transparent_70%)]"></div>

    <!-- Grim Icon -->
    <div class="float mb-10 z-10">
        <div class="relative w-24 h-24 sm:w-32 sm:h-32 md:w-36 md:h-36">
            <div class="absolute inset-0 border-8 border-white/20 border-t-transparent rounded-full animate-spin"></div>
            <svg class="absolute inset-0 w-14 h-14 md:w-20 md:h-20 text-white m-auto" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </div>
    </div>

    <!-- Main Content -->
    <div class="text-center z-10 max-w-[95%] md:max-w-2xl">

        <h1 class="text-4xl sm:text-6xl md:text-7xl font-bold text-white mb-3 pulse-slow grim-font leading-tight">
            COMING SOON
        </h1>

        <p class="text-base sm:text-xl text-gray-300 death-font">
            This site is still under construction
        </p>

        <p class="text-xs sm:text-sm md:text-lg text-gray-400 font-mono mt-2">
            Please wait... the darkness awaits... 💀
        </p>

        <!-- Progress Bar -->
        <div class="w-full max-w-md mx-auto mt-10 bg-gray-800 rounded-full h-4 overflow-hidden border border-gray-700">
            <div id="progressBar"
                 class="bg-white h-full rounded-full transition-all duration-1000 ease-out"
                 style="width: 0%">
            </div>
        </div>

        <!-- Contact Card -->
        <div class="bg-gray-900 mt-12 p-6 sm:p-8 rounded-2xl border border-gray-700 shadow-xl">
            <h2 class="text-2xl sm:text-4xl font-bold text-white mb-6 grim-font">
                REACH THE REAPER
            </h2>

            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4 justify-center">

                <!-- Facebook -->
                <a href="https://www.facebook.com/ge.o.682559/" target="_blank"
                   class="flex items-center justify-center p-4 bg-white/10 hover:bg-white/30 rounded-xl transition-all duration-300 hover:scale-110 shadow-lg backdrop-blur-sm">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg"
                         class="w-8 h-8 invert">
                </a>

                <!-- Instagram -->
                <a href="https://www.instagram.com/geno.rd/" target="_blank"
                   class="flex items-center justify-center p-4 bg-white/10 hover:bg-white/30 rounded-xl transition-all duration-300 hover:scale-110 shadow-lg backdrop-blur-sm">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg"
                         class="w-8 h-8 invert">
                </a>

                <!-- WhatsApp -->
                <a href="https://wa.me/6285167439635" target="_blank"
                   class="flex items-center justify-center p-4 bg-white/10 hover:bg-white/30 rounded-xl transition-all duration-300 hover:scale-110 shadow-lg backdrop-blur-sm">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg"
                         class="w-8 h-8 invert">
                </a>

                <!-- GitHub -->
                <a href="https://github.com/gennno" target="_blank"
                   class="flex items-center justify-center p-4 bg-white/10 hover:bg-white/30 rounded-xl transition-all duration-300 hover:scale-110 shadow-lg backdrop-blur-sm">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg"
                         class="w-8 h-8 invert">
                </a>

                <!-- Discord -->
                <a href="https://discordapp.com/users/583924333324271616" target="_blank"
                   class="flex items-center justify-center p-4 bg-white/10 hover:bg-white/30 rounded-xl transition-all duration-300 hover:scale-110 shadow-lg backdrop-blur-sm">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg"
                         class="w-8 h-8 invert">
                </a>

                <!-- Email -->
                <a href="mailto:mail@geovanno.my.id"
                   class="flex items-center justify-center p-4 bg-white/10 hover:bg-white/30 rounded-xl transition-all duration-300 hover:scale-110 shadow-lg backdrop-blur-sm">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M3 8l9 6 9-6M4 6h16a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/>
                    </svg>
                </a>

            </div>
        </div>


        <p class="text-white/50 mt-10 text-xs sm:text-sm">
            © 2025 - DayR
        </p>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById("progressBar").style.width = "90%";
            }, 500);
        };
    </script>

</body>
</html>

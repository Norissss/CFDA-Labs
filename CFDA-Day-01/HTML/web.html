<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="img/OIP.webp">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #FBFAF7;
            --ink: #21262B;
            --ink-soft: #5B6660;
            --accent: #3F7D69;
            --accent-soft: #DCEAE3;
            --sun: #E4A94A;
            --line: #E5E2D8;
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        .display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--ink);
        }

        @keyframes drift {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes grow-sprout {
            0% {
                transform: scaleY(0);
            }

            100% {
                transform: scaleY(1);
            }
        }

        @keyframes rise-leaf {
            0% {
                opacity: 0;
                transform: translateY(6px) scale(0.7);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes soft-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .55;
            }
        }

        .drift {
            animation: drift 4s ease-in-out infinite;
        }

        .soft-pulse {
            animation: soft-pulse 2.6s ease-in-out infinite;
        }

        .sprout-stem {
            transform-origin: bottom center;
            animation: grow-sprout 1.6s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        .sprout-leaf-l {
            transform-origin: bottom right;
            opacity: 0;
            animation: rise-leaf .7s ease-out .9s forwards;
        }

        .sprout-leaf-r {
            transform-origin: bottom left;
            opacity: 0;
            animation: rise-leaf .7s ease-out 1.1s forwards;
        }

        @media (prefers-reduced-motion: reduce) {

            .drift,
            .soft-pulse,
            .sprout-stem,
            .sprout-leaf-l,
            .sprout-leaf-r {
                animation: none !important;
            }
        }

        a:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center px-4 py-16 relative overflow-x-hidden">

    <!-- Ambient dot grid -->
    <div class="absolute inset-0 opacity-[0.35] pointer-events-none"
        style="background-image: radial-gradient(var(--line) 1px, transparent 1px); background-size: 22px 22px;">
    </div>

    <div class="text-center z-10 w-full max-w-md">

        <!-- Signature: growing sprout, stands in for "still building" -->
        <div class="drift mb-8 flex justify-center">
            <svg width="88" height="88" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="44" cy="44" r="43" stroke="var(--line)" stroke-width="1.5" />
                <line x1="44" y1="60" x2="44" y2="30" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"
                    class="sprout-stem" />
                <path d="M44 42 C 34 42, 30 34, 30 28 C 38 28, 44 34, 44 42 Z" fill="var(--accent-soft)"
                    stroke="var(--accent)" stroke-width="2" class="sprout-leaf-l" />
                <path d="M44 38 C 54 38, 58 30, 58 24 C 50 24, 44 30, 44 38 Z" fill="var(--accent-soft)"
                    stroke="var(--accent)" stroke-width="2" class="sprout-leaf-r" />
                <ellipse cx="44" cy="61" rx="14" ry="3.5" fill="var(--sun)" opacity="0.35" />
            </svg>
        </div>

        <p class="mono text-xs tracking-[0.3em] uppercase mb-3" style="color: var(--ink-soft);">
            status: building
        </p>

        <h1 class="display text-4xl sm:text-5xl font-semibold mb-3 leading-tight">
            Something's growing here
        </h1>

        <p class="text-sm sm:text-base soft-pulse" style="color: var(--ink-soft);">
            The site isn't ready yet — check back soon.
        </p>

        <!-- Progress -->
        <div class="mt-10">
            <div class="flex justify-between items-center mb-2">
                <span class="mono text-[11px] tracking-wide" style="color: var(--ink-soft);">progress</span>
                <span id="progressLabel" class="mono text-[11px]" style="color: var(--accent);">0%</span>
            </div>
            <div class="w-full h-2 rounded-full overflow-hidden" style="background: var(--accent-soft);">
                <div id="progressBar" class="h-full rounded-full transition-all duration-[1400ms] ease-out"
                    style="width: 0%; background: var(--accent);">
                </div>
            </div>
        </div>

        <!-- Contact Card -->
        <div class="mt-12 p-6 sm:p-7 rounded-2xl border" style="background: #fff; border-color: var(--line);">
            <h2 class="display text-base font-semibold mb-5 tracking-wide" style="color: var(--ink);">
                Get in touch
            </h2>

            <div class="grid grid-cols-3 sm:grid-cols-6 gap-3 justify-items-center">

                <!-- Facebook -->
                <a href="https://www.facebook.com/noris.parompon/" target="_blank" aria-label="Facebook"
                    class="flex items-center justify-center w-11 h-11 rounded-xl border transition-all duration-200 hover:-translate-y-0.5"
                    style="border-color: var(--line); background: var(--bg);">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" class="w-4.5 h-4.5"
                        style="width:18px;height:18px; filter: invert(20%) sepia(15%) saturate(500%) hue-rotate(115deg);">
                </a>

                <!-- Instagram -->
                <a href="https://www.instagram.com/nors_p/" target="_blank" aria-label="Instagram"
                    class="flex items-center justify-center w-11 h-11 rounded-xl border transition-all duration-200 hover:-translate-y-0.5"
                    style="border-color: var(--line); background: var(--bg);">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg"
                        style="width:18px;height:18px; filter: invert(20%) sepia(15%) saturate(500%) hue-rotate(115deg);">
                </a>

                <!-- WhatsApp -->
                <a href="https://wa.me/6281378664780" target="_blank" aria-label="WhatsApp"
                    class="flex items-center justify-center w-11 h-11 rounded-xl border transition-all duration-200 hover:-translate-y-0.5"
                    style="border-color: var(--line); background: var(--bg);">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg"
                        style="width:18px;height:18px; filter: invert(20%) sepia(15%) saturate(500%) hue-rotate(115deg);">
                </a>

                <!-- GitHub -->
                <a href="https://github.com/Norissss" target="_blank" aria-label="GitHub"
                    class="flex items-center justify-center w-11 h-11 rounded-xl border transition-all duration-200 hover:-translate-y-0.5"
                    style="border-color: var(--line); background: var(--bg);">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg"
                        style="width:18px;height:18px; filter: invert(20%) sepia(15%) saturate(500%) hue-rotate(115deg);">
                </a>

                <!-- Discord -->
                <a href="https://discordapp.com/users/583924333324271616" target="_blank" aria-label="Discord"
                    class="flex items-center justify-center w-11 h-11 rounded-xl border transition-all duration-200 hover:-translate-y-0.5"
                    style="border-color: var(--line); background: var(--bg);">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg"
                        style="width:18px;height:18px; filter: invert(20%) sepia(15%) saturate(500%) hue-rotate(115deg);">
                </a>

                <!-- Email -->
                <a href="norisparompon004@gmail.com" aria-label="Email"
                    class="flex items-center justify-center w-11 h-11 rounded-xl border transition-all duration-200 hover:-translate-y-0.5"
                    style="border-color: var(--line); background: var(--bg);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 8l9 6 9-6M4 6h16a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z" />
                    </svg>
                </a>

            </div>
        </div>

        <p class="mono text-[11px] mt-10" style="color: var(--ink-soft);">
            © 2025 · DayR
        </p>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                const target = 90;
                document.getElementById("progressBar").style.width = target + "%";
                document.getElementById("progressLabel").textContent = target + "%";
            }, 500);
        };
    </script>

</body>

</html>

<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevFlow Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <h1>DevFlow Task Board</h1>
        <form id="task-form">
            <label>Judul Task<input id="title" required></label>
            <label>Prioritas
                <select id="priority">
                    <option>low</option>
                    <option>medium</option>
                    <option>high</option>
                </select>
            </label>
            <button>Tambah</button>
        </form>
        <div class="toolbar">
            <input id="search" placeholder="Cari task">
            <select id="filter">
                <option value="all">Semua status</option>
                <option value="todo">To Do</option>
                <option value="done">Done</option>
            </select>
        </div>
        <section id="task-list"></section>
        <button onclick="klik()">Klik</button>
    </main>
    <script src="app.js"></script>
</body>

</html>
